name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Fail the build on any flake8 violation (config in setup.cfg).
          flake8 src tests

      - name: Run tests
        run: |
          # Build the processed dataset + model so training/API tests have inputs.
          python src/data_processing.py
          python src/train.py
          pytest tests/ -v
